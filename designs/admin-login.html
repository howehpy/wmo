<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绿色碳咨询 - 管理后台登录</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-wrapper { display: flex; width: 1000px; min-height: 560px; background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); overflow: hidden; }
        .login-brand { flex: 1; background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 40%, #43A047 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; position: relative; overflow: hidden; }
        .login-brand::before { content: ''; position: absolute; top: -80px; right: -80px; width: 260px; height: 260px; border-radius: 50%; background: rgba(255,255,255,0.06); }
        .login-brand::after { content: ''; position: absolute; bottom: -60px; left: -60px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.04); }
        .brand-icon { width: 90px; height: 90px; background: rgba(255,255,255,0.15); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 28px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .brand-icon svg { width: 48px; height: 48px; fill: #fff; }
        .brand-title { color: #fff; font-size: 28px; font-weight: 700; letter-spacing: 2px; margin-bottom: 12px; }
        .brand-subtitle { color: rgba(255,255,255,0.8); font-size: 15px; letter-spacing: 4px; margin-bottom: 40px; }
        .brand-features { list-style: none; width: 100%; max-width: 280px; }
        .brand-features li { color: rgba(255,255,255,0.85); font-size: 14px; padding: 10px 0; display: flex; align-items: center; gap: 12px; }
        .brand-features li::before { content: ''; width: 6px; height: 6px; background: #81C784; border-radius: 50%; flex-shrink: 0; }
        .login-form-section { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px 56px; }
        .form-header { margin-bottom: 40px; }
        .form-header h2 { font-size: 24px; color: #1a1a1a; font-weight: 600; margin-bottom: 8px; }
        .form-header p { font-size: 14px; color: #8c8c8c; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 14px; color: #333; font-weight: 500; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #bfbfbf; }
        .input-wrapper input { width: 100%; height: 44px; padding: 0 16px 0 42px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; color: #333; transition: all 0.3s; outline: none; }
        .input-wrapper input::placeholder { color: #bfbfbf; }
        .input-wrapper input:hover { border-color: #1B5E20; }
        .input-wrapper input:focus { border-color: #1B5E20; box-shadow: 0 0 0 2px rgba(27,94,32,0.12); }
        .captcha-row { display: flex; gap: 12px; }
        .captcha-row .input-wrapper { flex: 1; }
        .captcha-box { width: 120px; height: 44px; background: linear-gradient(135deg, #E8F5E9, #C8E6C9); border: 1px solid #d9d9d9; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; flex-shrink: 0; transition: all 0.3s; }
        .captcha-box:hover { border-color: #1B5E20; }
        .captcha-text { font-size: 22px; font-weight: 700; letter-spacing: 6px; color: #1B5E20; font-style: italic; text-decoration: line-through; text-decoration-color: rgba(27,94,32,0.3); }
        .captcha-tip { font-size: 12px; color: #8c8c8c; margin-top: 6px; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: #595959; }
        .remember-me input[type="checkbox"] { width: 16px; height: 16px; accent-color: #1B5E20; cursor: pointer; }
        .forgot-link { font-size: 14px; color: #1B5E20; text-decoration: none; transition: color 0.3s; }
        .forgot-link:hover { color: #2E7D32; }
        .login-btn { width: 100%; height: 44px; background: #1B5E20; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
        .login-btn:hover { background: #2E7D32; box-shadow: 0 4px 12px rgba(27,94,32,0.35); }
        .login-btn:active { background: #174d1b; }
        .login-footer { text-align: center; margin-top: 32px; font-size: 12px; color: #bfbfbf; }
        @media (max-width: 768px) { .login-wrapper { width: 95%; flex-direction: column; min-height: auto; } .login-brand { padding: 40px 30px; } .brand-features { display: none; } .login-form-section { padding: 40px 30px; } }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/></svg></div>
            <div class="brand-title">绿色碳咨询</div>
            <div class="brand-subtitle">GREEN CARBON CONSULTING</div>
            <ul class="brand-features">
                <li>专业的碳中和管理咨询服务</li>
                <li>一站式碳排放解决方案</li>
                <li>权威的绿色认证与评估</li>
                <li>智能化的数据管理平台</li>
            </ul>
        </div>
        <div class="login-form-section">
            <div class="form-header">
                <h2>管理后台</h2>
                <p>请使用管理员账号登录系统</p>
            </div>
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" id="username" placeholder="请输入用户名" autocomplete="off"/>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" placeholder="请输入密码"/>
                    </div>
                </div>
                <div class="form-group">
                    <label for="captcha">验证码</label>
                    <div class="captcha-row">
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            <input type="text" id="captcha" placeholder="请输入验证码" maxlength="4" autocomplete="off"/>
                        </div>
                        <div class="captcha-box" onclick="refreshCaptcha()" title="点击刷新验证码">
                            <span class="captcha-text" id="captchaDisplay">A3K7</span>
                        </div>
                    </div>
                    <div class="captcha-tip">点击验证码图片可刷新</div>
                </div>
                <div class="form-options">
                    <label class="remember-me"><input type="checkbox" checked/> 记住账号</label>
                    <a href="javascript:void(0)" class="forgot-link">忘记密码？</a>
                </div>
                <button type="submit" class="login-btn" onclick="handleLogin()">登 录</button>
            </form>
            <div class="login-footer">&copy; 2026 绿色碳咨询 版权所有</div>
        </div>
    </div>
    <script>
        function refreshCaptcha() { const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let code = ''; for (let i = 0; i < 4; i++) { code += chars.charAt(Math.floor(Math.random() * chars.length)); } document.getElementById('captchaDisplay').textContent = code; }
        function handleLogin() { const username = document.getElementById('username').value; const password = document.getElementById('password').value; const captcha = document.getElementById('captcha').value; if (!username) { alert('请输入用户名'); return; } if (!password) { alert('请输入密码'); return; } if (!captcha) { alert('请输入验证码'); return; } alert('登录成功！即将跳转至管理后台...'); window.location.href = 'admin-dashboard.html'; }
        document.addEventListener('keydown', function(e) { if (e.key === 'Enter') { handleLogin(); } });
    </script>
</body>
</html>
